apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-limites
  labels:
    app: nginx-limites
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-limites
  template:
    metadata:
      labels:
        app: nginx-limites
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
