apiVersion: v1
kind: Service
metadata:
  name: nginx-multi-port
  labels:
    app: nginx-sts
spec:
  type: ClusterIP
  selector:
    app: nginx-sts
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: https
    protocol: TCP
    port: 443
    targetPort: 443
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 9090
